name: Sync 2026 live archive

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 4-15 * * *"

permissions:
  contents: write

jobs:
  sync-live-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync live data
        run: npm run sync:live-2026

      - name: Commit updated live data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/live/2026.json
          if git diff --cached --quiet; then
            echo "No live data changes."
            exit 0
          fi
          git commit -m "chore: sync 2026 live archive"
          git push
